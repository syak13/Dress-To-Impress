services:

  # ─── DATABASE ───────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: dress_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dress_rental
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── ATOMIC SERVICES ────────────────────────────────────────────────────────
  customer_service:
    build: ./atomic/customer_service
    container_name: customer-service
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DBURI=mysql+mysqlconnector://root:root@mysql:3306/dress_rental

  inventory_service:
    build: ./atomic/inventory_service
    container_name: inventory-service
    restart: unless-stopped
    ports:
      - "5001:5001"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DBURI=mysql+mysqlconnector://root:root@mysql:3306/dress_rental

  booking_service:
    build: ./atomic/booking_service
    container_name: booking-service
    restart: unless-stopped
    ports:
      - "5002:5002"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DBURI=mysql+mysqlconnector://root:root@mysql:3306/dress_rental

  notification_service:
    build: ./atomic/notification_service
    container_name: notification-service
    restart: unless-stopped
    ports:
      - "5003:5003"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DBURI=mysql+mysqlconnector://root:root@mysql:3306/dress_rental

  rental_service:
    build: ./atomic/rental_service
    container_name: rental-service
    restart: unless-stopped
    ports:
      - "5004:5004"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DBURI=mysql+mysqlconnector://root:root@mysql:3306/dress_rental

  invoice_service:
    build: ./atomic/invoice_service
    container_name: invoice-service
    restart: unless-stopped
    ports:
      - "5005:5005"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DBURI=mysql+mysqlconnector://root:root@mysql:3306/dress_rental
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}

  return_assessment_service:
    build: ./atomic/return_assessment_service
    container_name: return-assessment-service
    restart: unless-stopped
    ports:
      - "5006:5006"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DBURI=mysql+mysqlconnector://root:root@mysql:3306/dress_rental
      - GROQ_API_KEY=${GROQ_API_KEY}

  # ─── COMPOSITE SERVICES ─────────────────────────────────────────────────────
  fitting_service:
    build: ./composite/composite_fitting
    container_name: fitting-service
    restart: unless-stopped
    ports:
      - "5010:5010"
    depends_on:
      - customer_service
      - inventory_service
      - booking_service
      - notification_service
    environment:
      - CUSTOMER_URL=http://customer_service:5000
      - INVENTORY_URL=http://inventory_service:5001
      - BOOKING_URL=http://booking_service:5002
      - NOTIFICATION_URL=https://personal-oqeeivkb.outsystemscloud.com/NotificationsAtomicMicroservice/rest/Notifications/SendNotification

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5673:5672"   # AMQP protocol port
      - "15672:15672" # Web UI dashboard port
  notification-worker:
    build: ./notification-worker  # We will create this folder next
    restart: always
    environment:
      - RABBITMQ_HOST=rabbitmq
      - NOTIFICATION_URL=https://personal-oqeeivkb.outsystemscloud.com/NotificationsAtomicMicroservice/rest/Notifications/SendNotification
    depends_on:
      - rabbitmq

  place_rental_order:
    build: ./composite/composite_rental
    container_name: place-rental-order
    restart: unless-stopped
    ports:
      - "5011:5011"
    depends_on:
      - customer_service
      - inventory_service
      - rental_service
      - invoice_service
      - notification_service
    environment:
      - CUSTOMER_URL=http://customer_service:5000
      - INVENTORY_URL=http://inventory_service:5001
      - RENTAL_URL=http://rental_service:5004
      - INVOICE_URL=http://invoice_service:5005
      - NOTIFICATION_URL=https://personal-oqeeivkb.outsystemscloud.com/NotificationsAtomicMicroservice/rest/Notifications/SendNotification

  returning_service:
    build: ./composite/composite_return
    container_name: returning-service
    restart: unless-stopped
    ports:
      - "5012:5012"
    depends_on:
      - rental_service
      - inventory_service
      - return_assessment_service
      - invoice_service
    volumes:
      - ./frontend/public/images:/images:ro
    environment:
      - RENTAL_URL=http://rental_service:5004
      - INVENTORY_URL=http://inventory_service:5001
      - RETURN_ASSESSMENT_URL=http://return_assessment_service:5006
      - INVOICE_URL=http://invoice_service:5005

  # ─── API GATEWAY (KONG) ─────────────────────────────────────────────────────
  kong:
    image: kong:3.6
    container_name: kong-gateway
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
    ports:
      - "8000:8000"   # Proxy — all frontend traffic enters here
      - "8001:8001"   # Admin API — inspect routes, services, plugins live
    volumes:
      - ./kong/kong.yml:/kong/declarative/kong.yml:ro
    depends_on:
      - customer_service
      - inventory_service
      - rental_service
      - invoice_service
      - fitting_service
      - place_rental_order
      - returning_service
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: dress_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: